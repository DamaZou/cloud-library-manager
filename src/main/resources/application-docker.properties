# Profil DOCKER : base PostgreSQL (utilisee avec docker-compose)
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:librarydb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:library_user}
spring.datasource.password=${DB_PASSWORD:library_pass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
